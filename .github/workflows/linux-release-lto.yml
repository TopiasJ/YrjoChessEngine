name: Build Linux Release-LTO

on:
  push:
    branches: [ main ]

jobs:
  build-linux-release-lto:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and target directory
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build release-lto binary
        run: cargo build --profile release-lto --bin yrjo_chess_engine

      - name: Get short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: build-${{ steps.vars.outputs.sha_short }}
          name: Latest Build (${{ steps.vars.outputs.sha_short }})
          body: |
            Automated build from commit ${{ github.sha }}
            
            Built with release-lto profile for optimal performance.
          files: target/release-lto/yrjo_chess_engine
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}